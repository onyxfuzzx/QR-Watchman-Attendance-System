<div class="login-page">
  <div class="login-card">

    <!-- TITLE -->
    <h2 class="login-title">Watchman Login</h2>
    <p class="login-subtitle">Secure access to attendance system</p>

    <!-- FORM -->
    <div class="login-form">
      <input type="text"
             placeholder="Username"
             [(ngModel)]="username"
             class="login-input" />

      <input type="password"
             placeholder="Password"
             [(ngModel)]="password"
             class="login-input" />

      <button (click)="login()"
              class="login-btn">
        Login
      </button>
    </div>

    <!-- ERROR -->
    <p class="login-error" *ngIf="error">
      {{ error }}
    </p>

  </div>
</div>

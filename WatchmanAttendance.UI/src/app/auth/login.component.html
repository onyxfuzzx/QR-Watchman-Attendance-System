<div class="login-page">
  <div class="login-card">

    <!-- LOGO / BRANDING -->
    <div class="login-header">
      <div class="login-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
             stroke-width="1.5" stroke="currentColor" class="icon">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598
                6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623
                5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196
                0-6.1-1.248-8.25-3.285Z" />
        </svg>
      </div>
      <h2 class="login-title">Watchman Attendance</h2>
      <p class="login-subtitle">Sign in to your account</p>
    </div>

    <!-- FORM -->
    <div class="login-form">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text"
               placeholder="Enter your username"
               [(ngModel)]="username"
               (keyup.enter)="login()"
               class="input" />
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password"
               placeholder="Enter your password"
               [(ngModel)]="password"
               (keyup.enter)="login()"
               class="input" />
      </div>

      <button (click)="login()"
              class="btn-primary w-full mt-2"
              [disabled]="loading">
        <span *ngIf="!loading">Sign In</span>
        <span *ngIf="loading" class="btn-loading">
          <svg class="spinner" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" stroke="currentColor"
                    stroke-width="3" fill="none" stroke-dasharray="31.4 31.4"
                    stroke-linecap="round" />
          </svg>
          Signing in...
        </span>
      </button>
    </div>

    <!-- ERROR -->
    <p *ngIf="error" class="login-error">
      {{ error }}
    </p>

  </div>
</div>

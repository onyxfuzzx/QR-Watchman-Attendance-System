<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="w-full max-w-sm bg-white rounded-xl shadow p-6">

    <h2 class="text-xl font-semibold text-center mb-1">
      Login
    </h2>
    <p class="text-sm text-gray-500 text-center mb-6">
      Admin & Watchman access
    </p>

    <input class="input mb-3"
           placeholder="Username"
           [(ngModel)]="username" />

    <input type="password"
           class="input mb-4"
           placeholder="Password"
           [(ngModel)]="password" />

    <button class="btn-primary w-full"
            (click)="login()"
            [disabled]="loading">
      {{ loading ? 'Signing in...' : 'Login' }}
    </button>

    <p *ngIf="error" class="text-red-500 text-sm text-center mt-4">
      {{ error }}
    </p>

  </div>
</div>
